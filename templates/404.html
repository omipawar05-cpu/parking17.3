{% extends "base.html" %}
{% block title %}404 — Not Found{% endblock %}

{% block content %}
<div class="error-page">
  <div>
    <div class="error-code">404</div>
    <h2 style="font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:2px;margin-bottom:0.5rem;">
      Page Not Found
    </h2>
    <p class="error-msg">
      {% if error %}{{ error }}{% else %}The page you're looking for doesn't exist or has been moved.{% endif %}
    </p>
    <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
      <a href="{{ url_for('home') }}" class="btn btn-primary">← Back to Home</a>
      <a href="{{ url_for('slots') }}" class="btn btn-outline">View Parking</a>
    </div>
  </div>
</div>
{% endblock %}
